services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  backend:
    build:
      context: ./backend
    environment:
      # Put GOOGLE_API_KEY into an .env file (NOT committed) or set it in your host environment.
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - PORT=8000
    volumes:
      # Persist uploaded PDFs (optional)
      - backend_uploads:/app/uploads
      # Persist Chroma (optional). If you prefer ephemeral vectors, remove this.
      - backend_chroma:/app/chroma_db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      # This is only used at runtime if your code reads it on the server.
      # In this Dockerfile we bake NEXT_PUBLIC_API_BASE_URL=/api at build time.
      - NODE_ENV=production
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  backend_uploads:
  backend_chroma:
